<!DOCTYPE html>
<html lang="en">
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<head>
    <meta charset="UTF-8">
    <title>Malik Sahab Tycoon - Urban Developer</title>
    <style>
        :root { --maroon: #4a0404; --beige: #fdf5e6; --gold: #ffd700; --landmark: #ff5722; }
        body { background: #1a0f0f; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #selection-screen { position: fixed; inset: 0; background: #1a0f0f; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .token-choice { font-size: 40px; padding: 20px; cursor: pointer; border: 2px solid transparent; border-radius: 10px; transition: 0.3s; text-align: center; }
        .token-choice:hover { border-color: var(--gold); background: #332b00; }

        #sidebar { width: 360px; background: rgba(0,0,0,0.95); border-right: 3px solid var(--gold); padding: 15px; display: flex; flex-direction: column; overflow-y: auto; }
        .player-card { padding: 12px; margin-bottom: 12px; border: 2px solid #444; border-radius: 10px; background: #222; position: relative; }
        .active-turn { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); background: #332b00; }
        
        #transcription-log { height: 140px; background: #111; border: 1px solid #444; font-size: 11px; padding: 10px; overflow-y: scroll; margin-top: auto; color: #0f0; }

        #game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #board { display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); width: 92vh; height: 92vh; background: var(--beige); border: 10px solid var(--maroon); position: relative; }
        
        #center { grid-column: 2 / 11; grid-row: 2 / 11; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; position: relative; overflow: hidden; }
        .malik-sketch { width: 100%; height: 100%; object-fit: contain; position: absolute; z-index: 1; opacity: 0.5; }
        .game-controls { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.7); padding: 15px; border-radius: 15px; }

        .space { border: 1px solid var(--maroon); color: #000; font-size: 8px; font-weight: bold; text-align: center; display: flex; flex-direction: column; position: relative; z-index: 5; }
        .color-bar { width: 100%; height: 15px; border-bottom: 1px solid #000; }
        .owner-stamp { position: absolute; top: 2px; right: 2px; font-size: 14px; }
        .dev-marker { position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); font-size: 12px; }

        .die { width: 50px; height: 50px; background: #c00; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #ffeb3b; border: 2px solid #900; }
        .token { width: 30px; height: 30px; font-size: 24px; position: absolute; z-index: 100; transition: all 0.5s ease; pointer-events: none; }
        
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 20px; border: 5px solid var(--maroon); z-index: 1000; text-align: center; display: none; width: 340px; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* Property Card Styling with Emblem */
        .property-card-header { border: 2px solid #000; padding: 10px; margin-bottom: 5px; color: white; font-weight: bold; text-transform: uppercase; }
        .card-emblem { width: 100px; height: auto; margin: 5px auto; display: block; filter: grayscale(1); opacity: 0.8; }
        .card-body { text-align: left; font-size: 13px; line-height: 1.4; }
        .card-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 4px 0; }
        .perks-box { background: #fffde7; border: 1px dashed #fbc02d; padding: 8px; font-size: 11px; margin-top: 10px; font-style: italic; }

        .asset-tag { font-size: 9px; padding: 2px 4px; background: var(--maroon); border: 1px solid var(--gold); border-radius: 3px; cursor: pointer; margin-right: 3px; display: inline-block; margin-top: 2px; color: white; }
        button { padding: 8px 12px; font-weight: bold; background: var(--maroon); color: white; border: none; border-radius: 5px; cursor: pointer; margin: 3px; }
    </style>
</head>
<body>

<div id="selection-screen">
    <h1 style="color:var(--gold)">MALIK SAHAB TYCOON</h1>
    <div id="choices-container" style="display:flex; gap:20px;"></div>
    <button id="start-game-btn" onclick="startGame()" style="margin-top:30px; font-size:20px;" disabled>START GAME</button>
</div>

<div id="sidebar">
    <h2 style="color:var(--gold); text-align:center;">ESTATE MANAGER</h2>
    <div id="player-list"></div>
    <div id="transcription-log"></div>
</div>

<div id="game-area">
    <div id="board">
        <div id="center">
            <img src="Malik Sb the great.jpeg" class="malik-sketch" alt="Malik Sab Centerpiece">
            <div class="game-controls">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <div class="die" id="die1">⚀</div><div class="die" id="die2">⚀</div>
                </div>
                <button id="roll-btn" onclick="handleRoll()">ROLL DICE</button>
            </div>
        </div>
    </div>
</div>

<!-- Updated Property Modal with Image Reference -->
<div id="sell-modal" class="modal">
    <div id="card-content">
        <div id="card-header" class="property-card-header">TITLE DEED</div>
        <img src="Gemini_Generated_Image_x6p0nbx6p0nbx6p0.jpg" class="card-emblem" alt="Punjab Emblem">
        <div class="card-body">
            <div class="card-row"><b>Rent:</b><span id="base-rent"></span></div>
            <div class="card-row"><b>With Hotel (3x):</b><span id="hotel-rent"></span></div>
            <div class="card-row"><b>With Landmark (5x):</b><span id="landmark-rent"></span></div>
            <hr>
            <div class="card-row"><span>Mortgage Value:</span><span id="mortgage-val"></span></div>
            <div id="perks" class="perks-box"></div>
        </div>
    </div>
    <div id="dev-controls" style="margin-top:15px;">
        <button onclick="buildAsset('hotel')">Add Hotel</button>
        <button onclick="buildAsset('landmark')">Add Landmark</button>
        <button id="btn-mortgage" onclick="toggleMortgage()" style="background:#d32f2f;">Mortgage</button>
    </div>
    <button onclick="closeModal('sell-modal')" style="background:#666; margin-top:10px; width:100%;">Close Card</button>
</div>

<div id="buy-modal" class="modal">
    <h3 id="buy-prop-name">Property</h3>
    <p id="buy-prop-price"></p>
    <button onclick="confirmBuy(true)">Buy Asset</button>
    <button onclick="initiateAuction()">Auction</button>
</div>

<div id="auction-modal" class="modal">
    <h3>URBAN AUCTION</h3>
    <p id="auc-prop-display"></p>
    <p>High Bid: Rs. <span id="auc-bid">0</span> (<span id="auc-winner">-</span>)</p>
    <div id="bidder-controls"></div>
    <button onclick="closeAuction()" style="background:gray; margin-top:10px;">Finalize Sale</button>
</div>
 <script>
const socket = io("https://f2d40cc7-c4c8-4d4a-907c-64b46e2e3648-00-1vds591cwvmau.pike.replit.dev");
const Game = {
currentPlayer: 0,

    waiting: false,
    selectedPropIndex: null,
    auction: { active: false, prop: null, highBid: 0, winner: null },
    tokens: [
        { name: "Tonga", icon: "🐎" }, { name: "Rickshaw", icon: "🛺" },
        { name: "Qingchi", icon: "🏍️" }, { name: "Bedford", icon: "🚌" },
        { name: "Ford", icon: "🚐" }
    ],
    players: [],
    board: [
        { name: "THOKAR ADA", type: "go" },
        { name: "MOCHI GATE", type: "prop", price: 600, rent: 50, color: "brown" },
        { name: "UNION COUNCIL", type: "notice" },
        { name: "TAXALI GATE", type: "prop", price: 800, rent: 60, color: "brown" },
        { name: "FEDERAL TAX", type: "tax", cost: 2000 },
        { name: "ANARKALI STN", type: "orange", price: 2000, rent: 200 },
        { name: "MORI GATE", type: "prop", price: 1000, rent: 80, color: "purple" },
        { name: "PUNJAB GOVT", type: "notice", color: "lightgreen" },
        { name: "SHAH ALAM", type: "prop", price: 1200, rent: 100, color: "purple" },
        { name: "LOHARI GATE", type: "prop", price: 1400, rent: 120, color: "purple" },
        { name: "KOT LAKHPAT", type: "jail" },
        { name: "KASHMIRI GATE", type: "prop", price: 1600, rent: 150, color: "pink" },
        { name: "LESCO", type: "util", price: 1500, rent: 150 },
        { name: "AKBARI MANDI", type: "prop", price: 1800, rent: 170, color: "pink" },
        { name: "YAKI GATE", type: "prop", price: 2000, rent: 190, color: "pink" },
        { name: "CHABURJI", type: "orange", price: 2000, rent: 200 },
        { name: "GULBERG", type: "prop", price: 2200, rent: 220, color: "orange" },
        { name: "UNION COUNCIL", type: "notice" },
        { name: "GARDEN TOWN", type: "prop", price: 2400, rent: 240, color: "orange" },
        { name: "MODEL TOWN", type: "prop", price: 2600, rent: 260, color: "orange" },
        { name: "SUTHRA PUNJAB", type: "parking", color: "lightgreen" },
        { name: "DEFENCE PH 1", type: "prop", price: 2800, rent: 300, color: "red" },
        { name: "PUNJAB GOVT", type: "notice", color: "lightgreen" },
        { name: "DEFENCE PH 5", type: "prop", price: 3000, rent: 320, color: "red" },
        { name: "BARKI ROAD", type: "prop", price: 3200, rent: 350, color: "red" },
        { name: "LAKSHMI STN", type: "orange", price: 2000, rent: 200 },
        { name: "WAPDA TOWN", type: "prop", price: 3400, rent: 380, color: "yellow" },
        { name: "WASA", type: "util", price: 1500, rent: 150 },
        { name: "JOHAR TOWN", type: "prop", price: 3600, rent: 420, color: "yellow" },
        { name: "VALENCIA", type: "prop", price: 4000, rent: 480, color: "yellow" },
        { name: "GO TO JAIL", type: "gotojail" },
        { name: "MALL ROAD", type: "prop", price: 4500, rent: 550, color: "green" },
        { name: "RAILWAY STATION", type: "prop", price: 4800, rent: 650, color: "green" },
        { name: "UNION COUNCIL", type: "notice" },
        { name: "FORTRESS", type: "prop", price: 5200, rent: 800, color: "green" },
        { name: "DERA GUJRAN", type: "orange", price: 2000, rent: 200 },
        { name: "UNION COUNCIL", type: "notice" },
        { name: "SHADBAGH RD", type: "prop", price: 5800, rent: 1100, color: "blue" },
        { name: "PERA TAX", type: "tax", cost: 1000 },
        { name: "SHAHDRA", type: "prop", price: 7000, rent: 1600, color: "blue" }
    ]
};

function logEvent(txt) {
    const log = document.getElementById('transcription-log');
    log.innerHTML += `<div>[${new Date().toLocaleTimeString([],{hour12:false,hour:'2-digit',minute:'2-digit'})}] ${txt}</div>`;
    log.scrollTop = log.scrollHeight;
}

function setupSelection() {
    const container = document.getElementById('choices-container');
    Game.tokens.forEach((t) => {
        const div = document.createElement('div');
        div.className = 'token-choice';
        div.innerHTML = `${t.icon}<br><small>${t.name}</small>`;
        div.onclick = () => {
            if(Game.players.length < 5) {
                Game.players.push({ id: Game.players.length, name: t.name, icon: t.icon, pos: 0, cash: 15000, props: [], inJail: false, bankrupt: false });
                div.style.opacity = '0.3'; div.onclick = null;
                if(Game.players.length >= 2) document.getElementById('start-game-btn').disabled = false;
            }
        };
        container.appendChild(div);
    });
}

function startGame() {
    document.getElementById('selection-screen').style.display = 'none';
    initBoard();
}

function handleRoll() {
    if(Game.waiting) return;
    let p = Game.players[Game.currentPlayer];
    if(p.bankrupt) return nextTurn();

    const d1 = Math.floor(Math.random()*6)+1, d2 = Math.floor(Math.random()*6)+1;
    const roll = d1+d2;
    document.getElementById('die1').innerText = getDieUnicode(d1);
    document.getElementById('die2').innerText = getDieUnicode(d2);

    p.pos = (p.pos + roll) % 40;
    syncToken(p.id);
    const s = Game.board[p.pos];
    
    if(s.price && s.owner === undefined) {
        Game.waiting = true;
        document.getElementById('buy-modal').style.display = 'block';
        document.getElementById('buy-prop-name').innerText = s.name;
        document.getElementById('buy-prop-price').innerText = `Price: Rs.${s.price}`;
    } else { nextTurn(); }
    updateUI();
}

function openManageAsset(propName) {
    const idx = Game.board.findIndex(b => b.name === propName);
    const s = Game.board[idx];
    Game.selectedPropIndex = idx;
    const modal = document.getElementById('sell-modal');
    const header = document.getElementById('card-header');
    
    modal.style.display = 'block';
    header.innerText = s.name;
    header.style.backgroundColor = s.color || '#333';
    document.getElementById('base-rent').innerText = `Rs.${s.rent}`;
    document.getElementById('hotel-rent').innerText = `Rs.${s.rent * 3}`;
    document.getElementById('landmark-rent').innerText = `Rs.${s.rent * 5}`;
    document.getElementById('mortgage-val').innerText = `Rs.${Math.floor(s.price * 0.66)}`;
}

function initBoard() {
    const b = document.getElementById('board');
    Game.board.forEach((s, i) => {
        const div = document.createElement('div'); div.className = 'space'; div.id = `space-${i}`;
        let r, c;
        if(i <= 10) { r=11; c=11-i; } else if(i <= 20) { r=11-(i-10); c=1; } else if(i <= 30) { r=1; c=i-19; } else { r=i-29; c=11; }
        if(s.color) div.innerHTML = `<div class="color-bar" style="background:${s.color}"></div>`;
        div.innerHTML += `<span style="margin-top:auto;">${s.name}</span><div id="stamp-${i}" class="owner-stamp"></div><div id="dev-marker-${i}" class="dev-marker"></div>`;
        Object.assign(div.style, { gridRow: r, gridColumn: c }); b.appendChild(div);
    });
    Game.players.forEach(p => {
        const t = document.createElement('div'); t.id = `token-${p.id}`; t.className = 'token'; t.innerHTML = p.icon;
        document.body.appendChild(t); syncToken(p.id);
    });
    updateUI();
}

function syncToken(id) {
    const rect = document.getElementById(`space-${Game.players[id].pos}`).getBoundingClientRect();
    const t = document.getElementById(`token-${id}`);
    t.style.left = `${rect.left + 5}px`; t.style.top = `${rect.top + 15}px`;
}

function updateUI() {
    document.getElementById('player-list').innerHTML = Game.players.map(p => `
        <div class="player-card ${p.id === Game.currentPlayer ? 'active-turn' : ''}">
            <b>${p.icon} ${p.name}</b>: Rs.${p.cash}
            <div>${p.props.map(pr => `<span class="asset-tag" onclick="openManageAsset('${pr}')">${pr}</span>`).join('')}</div>
        </div>
    `).join('');
}

function confirmBuy(buy) {
    const p = Game.players[Game.currentPlayer], s = Game.board[p.pos];
    document.getElementById('buy-modal').style.display = 'none';
    Game.waiting = false;
    if(buy && p.cash >= s.price) {
        p.cash -= s.price; s.owner = p.id; p.props.push(s.name);
        document.getElementById(`stamp-${p.pos}`).innerText = p.icon;
    }
    nextTurn();
}

function nextTurn() { Game.currentPlayer = (Game.currentPlayer + 1) % Game.players.length; updateUI(); }
function getDieUnicode(n) { return ['','⚀','⚁','⚂','⚃','⚄','⚅'][n]; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
window.onload = setupSelection;
</script>
</body>
</html>
